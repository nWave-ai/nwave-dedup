name: Release to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0.dev0)"
        required: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify dist with twine check
        run: twine check dist/*

      - name: Extract version
        id: version
        run: |
          v=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Built nwave-dedup $v"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/nwave-dedup/${{ needs.build.outputs.version }}
    permissions:
      id-token: write  # Required for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publisher, no token)
        uses: pypa/gh-action-pypi-publish@release/v1

  smoke-test:
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Wait for PyPI to propagate
        run: sleep 60

      - name: Install from PyPI
        run: |
          python -m pip install --upgrade pip
          pip install "nwave-dedup==${{ needs.build.outputs.version }}"

      - name: Verify CLI works
        run: |
          nwave-dedup --version
          nwave-dedup scan --help
